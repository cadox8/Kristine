<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <meta name="description" content="Description">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <!-- Theme: Simple Dark -->
    <link
            rel="stylesheet"
            href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css"
            title="docsify-darklight-theme"
            type="text/css"
    />
</head>
<body>
<div id="app"></div>
<script>
    window.$docsify = {
        name: 'Kristine',
        repo: 'https://github.com/cadox8/Kristine',
        loadSidebar: true,
        loadNavbar: true,
        coverpage: true,
        auto2top: true,
        logo: '/_media/kristine.png',
        themeColor: '#04c0ea',
        search: 'auto',

        darklightTheme: {
            siteFont: "PT Sans",
            defaultTheme: 'dark',
            codeFontFamily: 'Roboto Mono, Monaco, courier, monospace',
            bodyFontSize: '17px',
            dark: {
                accent: '#42b983',
                toogleBackground: '#ffffff',
                background: '#091a28',
                textColor: '#b4b4b4',
                codeTextColor: '#ffffff',
                codeBackgroundColor: '#0e2233',
                borderColor: '#0d2538',
                blockQuoteColor: '#858585',
                highlightColor: '#d22778',
                sidebarSublink: '#b4b4b4',
                codeTypeColor: '#ffffff',
                coverBackground: 'linear-gradient(175deg, rgba(5,106,62,1) 0%, rgba(5,86,105,1) 100%)',
                toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/sun.svg)'
            },
            light: {
                accent: '#42b983',
                toogleBackground: '#091a28',
                background: '#ffffff',
                textColor: '#34495e',
                codeTextColor: '#525252',
                codeBackgroundColor: '#f8f8f8',
                borderColor: 'rgba(0, 0, 0, 0.07)',
                blockQuoteColor: '#858585',
                highlightColor: '#d22778',
                sidebarSublink: '#b4b4b4',
                codeTypeColor: '#091a28',
                coverBackground: 'linear-gradient(to left bottom, hsl(118, 100%, 85%) 0%,hsl(181, 100%, 85%) 100%)',
                toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/moon.svg)'
            }
        }
    }
</script>
<!-- Docsify v4 -->
<script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.23.0/components/prism-typescript.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.23.0/components/prism-sql.min.js"></script>
<script>
    if (typeof navigator.serviceWorker !== 'undefined') {
        navigator.serviceWorker.register('sw.js')
    }
</script>
</body>
</html>
